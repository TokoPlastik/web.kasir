<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Amanah - Kasir Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.6.1/firebase-firestore.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;background:#f1f5f9;display:flex;height:100vh}
.header{position:fixed;top:0;left:0;width:100%;background:#111827;color:white;padding:12px 20px;font-weight:600;z-index:10}
.menu{width:60%;padding:70px 20px 20px;overflow:auto}
.cart{width:40%;background:white;padding:70px 20px 20px;display:flex;flex-direction:column;box-shadow:-3px 0 10px rgba(0,0,0,0.1)}
.card{background:white;padding:12px;border-radius:12px;margin:8px 0;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
button{border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px}
.btn-add{background:#10b981;color:white}
.btn-edit{background:#3b82f6;color:white}
.btn-delete{background:#ef4444;color:white}
.btn-main{background:#111827;color:white;width:100%;padding:10px;margin-top:6px}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
.cart-item{display:flex;justify-content:space-between;align-items:center;background:#f9fafb;padding:10px;border-radius:8px;margin:5px 0}
.total{font-size:18px;font-weight:600;margin-top:auto}
.small{font-size:12px;color:#666}
.qty-btn{padding:4px 8px;margin:0 2px}
</style>
</head>
<body>

<div class="header">🛍️ TOKO AMANAH</div>

<div class="menu">
<h2>Menu Barang</h2>
<input type="text" id="search" placeholder="Cari barang..." onkeyup="renderMenu()">
<div id="menuList"></div>

<h3>Tambah / Update Barang</h3>
<input type="text" id="nama" placeholder="Nama barang">
<input type="number" id="harga" placeholder="Harga">
<button class="btn-main" onclick="tambahBarang()">Simpan</button>

<h3>📊 Total Hari Ini</h3>
<div id="totalHarian" class="card">Rp0</div>

<h3>📜 Riwayat Transaksi</h3>
<div id="riwayat"></div>
</div>

<div class="cart">
<h2>Keranjang</h2>
<div id="cartList"></div>
<div class="total" id="total">Total: Rp0</div>
<input type="number" id="bayar" placeholder="Uang bayar">
<div id="kembalian"></div>
<button class="btn-main" onclick="hitungKembalian()">Hitung Kembalian</button>
<button class="btn-main" onclick="printStruk()">Print Struk</button>
<button class="btn-main" onclick="selesaiTransaksi()">Selesai</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD8LPcTPpM1ctJQuOQAaWGh232T5xJ4j-U",
  authDomain: "kasir-b0121.firebaseapp.com",
  projectId: "kasir-b0121",
  storageBucket: "kasir-b0121.firebasestorage.app",
  messagingSenderId: "419878534431",
  appId: "1:419878534431:web:f7fd82902320cccb98442a",
  measurementId: "G-0T6SL0EK5D"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];

// ================= Helper =================
function formatRp(num){
  return num.toLocaleString('id-ID');
}

// ================= Barang =================
async function tambahBarang(){
  const nama = document.getElementById("nama").value.trim();
  const harga = Number(document.getElementById("harga").value);
  if(!nama || !harga) return alert("Isi semua");

  await db.collection("barang").doc(nama.toLowerCase()).set({ nama, harga });
  document.getElementById("nama").value="";
  document.getElementById("harga").value="";
  renderMenu();
}

async function hapusBarang(nama){
  if(confirm("Hapus barang?")){
    await db.collection("barang").doc(nama.toLowerCase()).delete();
    renderMenu();
  }
}

async function editHarga(nama, hargaLama){
  const hargaBaru = prompt("Harga baru:", hargaLama);
  if(hargaBaru){
    await db.collection("barang").doc(nama.toLowerCase()).update({ harga: Number(hargaBaru) });
    renderMenu();
  }
}

async function renderMenu(){
  const keyword = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("menuList");
  list.innerHTML="";

  const snapshot = await db.collection("barang").get();
  snapshot.forEach(doc=>{
    const b = doc.data();
    if(!b.nama.toLowerCase().includes(keyword)) return;
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <b>${b.nama}</b><br>
      Rp${formatRp(b.harga)}<br><br>
      <button class='btn-add' onclick="tambahKeCart('${b.nama}', ${b.harga})">Tambah</button>
      <button class='btn-edit' onclick="editHarga('${b.nama}', ${b.harga})">Edit</button>
      <button class='btn-delete' onclick="hapusBarang('${b.nama}')">Hapus</button>
    `;
    list.appendChild(div);
  });
}

// ================= Keranjang =================
function tambahKeCart(nama, harga){
  const item = cart.find(i=>i.nama===nama);
  if(item) item.qty++;
  else cart.push({nama, harga, qty:1});
  renderCart();
}

function renderCart(){
  const list = document.getElementById("cartList");
  list.innerHTML="";
  let total = 0;
  cart.forEach((c,i)=>{
    const sub = c.harga*c.qty;
    total+=sub;
    const div=document.createElement("div");
    div.className="cart-item";
    div.innerHTML=`
      <div>
        ${c.nama}<br>
        <span class="small">Rp${formatRp(c.harga)}</span>
      </div>
      <div>
        <button class='qty-btn' onclick="kurangQty(${i})">-</button>
        ${c.qty}
        <button class='qty-btn' onclick="tambahQty(${i})">+</button>
        <button class='btn-delete' onclick="hapusItem(${i})">x</button>
      </div>
    `;
    list.appendChild(div);
  });
  document.getElementById("total").innerText="Total: Rp"+formatRp(total);
}

function tambahQty(i){ cart[i].qty++; renderCart(); }
function kurangQty(i){ if(cart[i].qty>1){cart[i].qty--;} else{cart.splice(i,1);} renderCart(); }
function hapusItem(i){ cart.splice(i,1); renderCart(); }

function hitungKembalian(){
  const bayar = Number(document.getElementById("bayar").value);
  const total = cart.reduce((a,b)=>a+(b.harga*b.qty),0);
  if(!bayar) return;
  const kembali = bayar-total;
  document.getElementById("kembalian").innerText = kembali>=0
    ? "Kembalian: Rp"+formatRp(kembali)
    : "Uang tidak cukup";
}

async function selesaiTransaksi(){
  if(cart.length===0) return;
  const total = cart.reduce((a,b)=>a+(b.harga*b.qty),0);

  await db.collection("riwayat").add({
    tanggal: new Date().toISOString(),
    total,
    items: cart
  });

  cart=[];
  document.getElementById("bayar").value="";
  document.getElementById("kembalian").innerText="";
  renderCart();
  renderRiwayat();
}

function printStruk(){
  let text="TOKO AMANAH\n================\n";
  let total=0;
  cart.forEach(c=>{
    let sub=c.harga*c.qty;
    total+=sub;
    text+=`${c.nama} x${c.qty} Rp${formatRp(sub)}\n`;
  });
  text+="----------------\nTotal: Rp"+formatRp(total);
  const w=window.open();
  w.document.write("<pre>"+text+"</pre>");
  w.print();
}

// ================= Riwayat =================
async function renderRiwayat(){
  const div=document.getElementById("riwayat");
  div.innerHTML="";
  let totalHarian=0;

  const snapshot = await db.collection("riwayat").orderBy("tanggal","desc").get();
  snapshot.forEach(doc=>{
    const r = doc.data();
    totalHarian += r.total;
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`${new Date(r.tanggal).toLocaleString()}<br>Rp${formatRp(r.total)}`;
    div.appendChild(el);
  });

  document.getElementById("totalHarian").innerText="Rp"+formatRp(totalHarian);
}

// Initial render
renderMenu();
renderRiwayat();
</script>

</body>
</html>
